<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HighSNR Circuit Builder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        :root {
            --bg: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.85);
            --accent: #38bdf8;
            --text: #f8fafc;
            --grid: rgba(0, 0, 0, 0.05);
        }
        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden;
            user-select: none;
        }
        #sidebar {
            width: 260px; background: var(--panel-bg); backdrop-filter: blur(12px);
            padding: 20px; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column;
            box-shadow: 5px 0 20px rgba(0,0,0,0.5); z-index: 10; flex-shrink: 0;
        }
        #right-sidebar {
            width: 260px; background: var(--panel-bg); backdrop-filter: blur(12px);
            padding: 20px; border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5); z-index: 10; flex-shrink: 0;
        }
        h2 { margin-top: 0; font-weight: 600; font-size: 1.2rem; color: var(--accent); margin-bottom: 20px;}
        .tools-scroll {
            overflow-y: auto; flex-grow: 1; padding-right: 5px;
        }
        .tools-scroll::-webkit-scrollbar { width: 4px; }
        .tools-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        .tool-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white;
            padding: 10px 12px; margin-bottom: 6px; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; text-align: left; font-size: 0.9rem; display: flex; align-items: center;
            width: 100%;
        }
        .tool-btn:hover { background: rgba(56, 189, 248, 0.15); border-color: rgba(56, 189, 248, 0.5); }
        .tool-btn.active { 
            background: var(--accent); color: #020617; font-weight: 600; 
            border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); 
        }
        #canvas-container {
            flex-grow: 1; position: relative; min-width: 0; overflow: hidden;
            background-color: #ffffff;
        }
        svg {
            background: transparent;
            cursor: crosshair;
            display: block;
        }
        #code-panel {
            position: absolute; bottom: 20px; right: 20px; background: var(--panel-bg);
            backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            padding: 20px; width: 450px; display: none; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        textarea {
            background: #020617; color: #a5b4fc; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 12px; height: 200px; font-family: 'Consolas', monospace; 
            resize: none; margin-bottom: 15px; font-size: 0.85rem; outline: none;
        }
        textarea:focus { border-color: var(--accent); }
        .primary-btn {
            background: var(--accent); color: #020617; border: none; padding: 12px; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: 1rem; transition: transform 0.1s, box-shadow 0.2s;
            margin-top: 10px; width: 100%;
        }
        .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }
        .primary-btn:active { transform: translateY(0); }
        
        .hints { font-size: 0.8rem; color: #64748b; line-height: 1.6; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 10px; margin-top: 10px;}
        .hints strong { color: #94a3b8; }
    </style>
</head>
<body>
    <div id="sidebar">
        <a href="https://www.youtube.com/@High_SNR_Channel" target="_blank" style="text-decoration: none; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
            <img src="highsnr_logo.png" alt="HighSNR Logo" style="height: 45px; object-fit: contain;">
            <div style="display: flex; flex-direction: column;">
                <span style="font-weight: 600; color: white; font-size: 1.1rem; letter-spacing: 0.5px;">HighSNR</span>
                <span style="font-size: 0.75rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px;">YouTube Channel</span>
            </div>
        </a>
        
        <div class="tools-scroll">
            <button class="tool-btn active" data-tool="cursor">Pointer (Esc)</button>
            <button class="tool-btn" data-tool="Wire">Wire</button>
            <button class="tool-btn" data-tool="Junction">Junction (Dot)</button>
            <button class="tool-btn" data-tool="Resistor">Resistor</button>
            <button class="tool-btn" data-tool="Capacitor">Capacitor</button>
            <button class="tool-btn" data-tool="NMOS">NMOS Transistor</button>
            <button class="tool-btn" data-tool="Ground">Ground (GND)</button>
            <button class="tool-btn" data-tool="Switch">Switch</button>
            <button class="tool-btn" data-tool="Diode">Diode</button>
            <button class="tool-btn" data-tool="Inductor">Inductor</button>
            <button class="tool-btn" data-tool="Label">Text (Label)</button>
        </div>
        
        <div class="hints">
            <strong>LMB</strong>: Place / Start Wire<br>
            <strong>RMB</strong>: Rotate Element<br>
            <strong>Ctrl + Z</strong>: Undo Last<br>
            <strong>Mouse Wheel</strong>: Zoom In / Out<br>
            <strong>MMB (or Shift+LMB)</strong>: Pan Canvas
        </div>
        
        <div style="margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
            <label for="scale-input" style="font-size: 0.9rem; color: #a5b4fc;">Manim Scale:</label>
            <input type="number" id="scale-input" value="1.0" step="0.1" style="width: 60px; background: #020617; color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 4px; text-align: center;">
        </div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="primary-btn" id="btn-save" style="margin: 0; background: #334155; flex: 1; font-size: 0.8rem;">Save Project</button>
            <button class="primary-btn" id="btn-load" style="margin: 0; background: #334155; flex: 1; font-size: 0.8rem;">Load Project</button>
        </div>
        <input type="file" id="file-input" accept=".json" style="display: none;">
        
        <button class="primary-btn" id="btn-export">Export to Manim</button>
    </div>
    
    <div id="canvas-container">
        <svg id="schematic" width="100%" height="100%" viewBox="-7 -4 14 8" preserveAspectRatio="xMidYMid slice" oncontextmenu="return false;"></svg>
    </div>

    <div id="right-sidebar">
        <h2>Shapes & Layers</h2>
        
        <div class="tools-scroll" style="flex-grow: 0; margin-bottom: 20px;">
            <button class="tool-btn" data-tool="Rectangle">Rectangle</button>
            <button class="tool-btn" data-tool="Circle">Circle</button>
            <button class="tool-btn" data-tool="Ellipse">Ellipse</button>
        </div>
        
        <div style="margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
            <h4 style="margin: 0 0 10px 0; color: #a5b4fc; font-size: 0.9rem;">Shape Style</h4>
            
            <div style="margin-bottom: 10px;">
                <label style="font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 5px;">Layer:</label>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-size: 0.8rem; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="radio" name="shape-layer" value="under" checked> Under Circuit
                    </label>
                    <label style="font-size: 0.8rem; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="radio" name="shape-layer" value="over"> Over Circuit
                    </label>
                </div>
            </div>

            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px;">
                <label style="font-size: 0.8rem; color: #94a3b8;">Fill Color:</label>
                <input type="color" id="shape-fill" value="#38bdf8" style="background: none; border: none; cursor: pointer; width: 30px; height: 30px; padding: 0;">
            </div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <label style="font-size: 0.8rem; color: #94a3b8;">Opacity:</label>
                <input type="range" id="shape-opacity" min="0" max="1" step="0.1" value="0.5" style="width: 70px;">
            </div>
        </div>
        
        <div class="hints" style="margin-top: auto;">
            <strong>LMB</strong>: Start Shape<br>
            <strong>Drag</strong>: Size Shape<br>
            (Shapes use two clicks)
        </div>
    </div>

    <div id="code-panel">
        <h3 style="margin-top:0; margin-bottom:15px; color:var(--accent);">Manim Python Script</h3>
        <textarea id="code-output" readonly></textarea>
        <div style="display:flex; gap:10px;">
            <button class="primary-btn" id="btn-copy" style="flex:1; margin-top:0;">Copy Code</button>
            <button class="primary-btn" id="btn-close" style="background:#334155; color:white; margin-top:0;">Close</button>
        </div>
    </div>

    <script>
        const svg = document.getElementById('schematic');
        let currentTool = 'cursor';
        let items = []; 
        let activeWireStart = null;
        let activeShapeStart = null;
        let previewElem = null;

        let selectedIndex = -1;
        let draggedItemIndex = -1;
        let dragOffset = {x: 0, y: 0, x2: 0, y2: 0};



        function updatePropertiesPanel() {
            if (selectedIndex !== -1) {
                let item = items[selectedIndex];
                if (['Rectangle', 'Circle', 'Ellipse'].includes(item.type)) {
                    document.getElementById('shape-fill').value = item.fill;
                    document.getElementById('shape-opacity').value = item.opacity;
                    const r = document.querySelector(`input[name="shape-layer"][value="${item.layer}"]`);
                    if (r) r.checked = true;
                }
            }
        }

        ['shape-fill', 'shape-opacity'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                if (selectedIndex !== -1 && ['Rectangle', 'Circle', 'Ellipse'].includes(items[selectedIndex].type)) {
                    if (id === 'shape-fill') items[selectedIndex].fill = e.target.value;
                    if (id === 'shape-opacity') items[selectedIndex].opacity = e.target.value;
                    renderAll();
                }
            });
        });

        document.querySelectorAll('input[name="shape-layer"]').forEach(el => {
            el.addEventListener('change', (e) => {
                if (selectedIndex !== -1 && ['Rectangle', 'Circle', 'Ellipse'].includes(items[selectedIndex].type)) {
                    items[selectedIndex].layer = e.target.value;
                    renderAll();
                }
            });
        });

        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                activeWireStart = null;
                activeShapeStart = null;
                selectedIndex = -1;
                updatePropertiesPanel();
                if(previewElem) { previewElem.remove(); previewElem = null; }
                interactiveLayer.innerHTML = ''; 
                renderAll();
            });
        });

        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        defs.innerHTML = `
            <pattern id="grid" width="0.1" height="0.1" patternUnits="userSpaceOnUse">
                <path d="M 0.1 0 L 0 0 0 0.1" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="0.01"/>
            </pattern>
        `;
        svg.appendChild(defs);

        const bgGrid = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        bgGrid.setAttribute("width", "1000");
        bgGrid.setAttribute("height", "1000");
        bgGrid.setAttribute("x", "-500");
        bgGrid.setAttribute("y", "-500");
        bgGrid.setAttribute("fill", "url(#grid)");
        svg.appendChild(bgGrid);

        const axes = document.createElementNS("http://www.w3.org/2000/svg", "g");
        axes.innerHTML = `
            <line x1="-100" y1="0" x2="100" y2="0" stroke="rgba(0,0,0,0.1)" stroke-width="0.02"/>
            <line x1="0" y1="-100" x2="0" y2="100" stroke="rgba(0,0,0,0.1)" stroke-width="0.02"/>
        `;
        svg.appendChild(axes);

        const renderLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
        const interactiveLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
        svg.appendChild(renderLayer);
        svg.appendChild(interactiveLayer);

        function getMouseCoords(e) {
            const pt = svg.createSVGPoint();
            pt.x = e.clientX; pt.y = e.clientY;
            const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
            return { x: Math.round(svgP.x * 10) / 10, y: Math.round(svgP.y * 10) / 10 };
        }

        function getSVGShape(type) {
            let s = '';
            if (type === 'Resistor') {
                s = `<polyline points="-1.0,0 -0.35,0 -0.25,-0.16 -0.15,0.16 -0.05,-0.16 0.05,0.16 0.15,-0.16 0.25,0.16 0.35,0 1.0,0" fill="none" stroke="#000" stroke-width="0.02" stroke-linejoin="round"/>`;
            } else if (type === 'Capacitor') {
                s = `<line x1="-1.0" y1="0" x2="-0.08" y2="0" stroke="#000" stroke-width="0.02"/>
                     <line x1="-0.08" y1="-0.4" x2="-0.08" y2="0.4" stroke="#000" stroke-width="0.02"/>
                     <line x1="0.08" y1="-0.4" x2="0.08" y2="0.4" stroke="#000" stroke-width="0.02"/>
                     <line x1="0.08" y1="0" x2="1.0" y2="0" stroke="#000" stroke-width="0.02"/>`;
            } else if (type === 'Ground') {
                s = `<line x1="0" y1="0" x2="0" y2="0.3" stroke="#000" stroke-width="0.02"/>
                     <line x1="-0.3" y1="0.3" x2="0.3" y2="0.3" stroke="#000" stroke-width="0.02"/>
                     <line x1="-0.2" y1="0.4" x2="0.2" y2="0.4" stroke="#000" stroke-width="0.02"/>
                     <line x1="-0.1" y1="0.5" x2="0.1" y2="0.5" stroke="#000" stroke-width="0.02"/>`;
            } else if (type === 'NMOS') {
                s = `<line x1="-1.0" y1="0" x2="-0.1" y2="0" stroke="#000" stroke-width="0.02"/>
                     <line x1="-0.1" y1="-0.4" x2="-0.1" y2="0.4" stroke="#000" stroke-width="0.02"/>
                     <line x1="0.1" y1="-0.4" x2="0.1" y2="0.4" stroke="#000" stroke-width="0.06"/>
                     <line x1="0.1" y1="-0.3" x2="0.5" y2="-0.3" stroke="#000" stroke-width="0.02"/>
                     <line x1="0.5" y1="-0.3" x2="0.5" y2="-1.0" stroke="#000" stroke-width="0.02"/>
                     <line x1="0.1" y1="0.3" x2="0.5" y2="0.3" stroke="#000" stroke-width="0.02"/>
                     <line x1="0.5" y1="0.3" x2="0.5" y2="1.0" stroke="#000" stroke-width="0.02"/>`;
            } else if (type === 'Junction') {
                s = `<circle cx="0" cy="0" r="0.1" fill="#000"/>`;
            } else if (type === 'Switch') {
                s = `<line x1="-1.0" y1="0" x2="-0.3" y2="0" stroke="#000" stroke-width="0.02"/>
                     <circle cx="-0.26" cy="0" r="0.04" fill="none" stroke="#000" stroke-width="0.02"/>
                     <line x1="-0.26" y1="-0.04" x2="0.22" y2="-0.4" stroke="#000" stroke-width="0.02"/>
                     <circle cx="0.26" cy="0" r="0.04" fill="none" stroke="#000" stroke-width="0.02"/>
                     <line x1="0.3" y1="0" x2="1.0" y2="0" stroke="#000" stroke-width="0.02"/>`;
            } else if (type === 'Diode') {
                s = `<line x1="-1.0" y1="0" x2="-0.25" y2="0" stroke="#000" stroke-width="0.02"/>
                     <line x1="-0.25" y1="0" x2="0.25" y2="0" stroke="#000" stroke-width="0.02"/>
                     <polygon points="-0.25,-0.25 -0.25,0.25 0.25,0" fill="none" stroke="#000" stroke-width="0.02"/>
                     <line x1="0.25" y1="-0.25" x2="0.25" y2="0.25" stroke="#000" stroke-width="0.02"/>
                     <line x1="0.25" y1="0" x2="1.0" y2="0" stroke="#000" stroke-width="0.02"/>`;
            } else if (type === 'Inductor') {
                s = `<line x1="-1.0" y1="0" x2="-0.6" y2="0" stroke="#000" stroke-width="0.02"/>
                     <path d="M -0.6 0 A 0.2 0.2 0 0 0 -0.2 0 A 0.2 0.2 0 0 0 0.2 0 A 0.2 0.2 0 0 0 0.6 0" fill="none" stroke="#000" stroke-width="0.02"/>
                     <line x1="0.6" y1="0" x2="1.0" y2="0" stroke="#000" stroke-width="0.02"/>`;
            }
            return s;
        }

        function renderAll() {
            renderLayer.innerHTML = '';
            const underLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
            const overLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
            renderLayer.appendChild(underLayer);
            renderLayer.appendChild(overLayer);

            items.forEach((item, i) => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const isSelected = (i === selectedIndex);
                const color = isSelected ? '#38bdf8' : '#000';
                const sw = isSelected ? '0.04' : '0.02';

                if (item.type === 'Wire') {
                    g.innerHTML = `
                        <line x1="${item.x1}" y1="${item.y1}" x2="${item.x2}" y2="${item.y2}" stroke="transparent" stroke-width="0.3"/>
                        <line x1="${item.x1}" y1="${item.y1}" x2="${item.x2}" y2="${item.y2}" stroke="${color}" stroke-width="${sw}"/>
                    `;
                } else if (item.type === 'Rectangle') {
                    const w = Math.abs(item.x2 - item.x1);
                    const h = Math.abs(item.y2 - item.y1);
                    const minX = Math.min(item.x1, item.x2);
                    const minY = Math.min(item.y1, item.y2);
                    g.innerHTML = `<rect x="${minX}" y="${minY}" width="${w}" height="${h}" fill="${item.fill}" fill-opacity="${item.opacity}" stroke="${color}" stroke-width="${sw}"/>`;
                } else if (item.type === 'Circle') {
                    const r = Math.hypot(item.x2 - item.x1, item.y2 - item.y1);
                    g.innerHTML = `<circle cx="${item.x1}" cy="${item.y1}" r="${r}" fill="${item.fill}" fill-opacity="${item.opacity}" stroke="${color}" stroke-width="${sw}"/>`;
                } else if (item.type === 'Ellipse') {
                    const rx = Math.abs(item.x2 - item.x1);
                    const ry = Math.abs(item.y2 - item.y1);
                    g.innerHTML = `<ellipse cx="${item.x1}" cy="${item.y1}" rx="${rx}" ry="${ry}" fill="${item.fill}" fill-opacity="${item.opacity}" stroke="${color}" stroke-width="${sw}"/>`;
                } else if (item.type === 'Label') {
                    g.setAttribute("transform", `translate(${item.x}, ${item.y})`);
                    g.innerHTML = `
                        <rect x="-0.5" y="-0.2" width="1.0" height="0.4" fill="transparent"/>
                        <text x="0" y="0" fill="${color}" font-size="0.3" font-family="monospace" text-anchor="middle" dominant-baseline="central">${item.text}</text>
                    `;
                } else {
                    g.setAttribute("transform", `translate(${item.x}, ${item.y}) rotate(${item.angle})`);
                    let shapeHtml = getSVGShape(item.type);
                    if (isSelected) {
                        shapeHtml = shapeHtml.replace(/stroke="#000"/g, `stroke="${color}"`);
                        shapeHtml = shapeHtml.replace(/stroke-width="0.02"/g, `stroke-width="${sw}"`);
                        shapeHtml = shapeHtml.replace(/fill="#000"/g, `fill="${color}"`);
                    }
                    g.innerHTML = `
                        <circle cx="0" cy="0" r="0.4" fill="transparent"/>
                        ${shapeHtml}
                    `;
                }

                g.style.cursor = currentTool === 'cursor' ? 'move' : 'crosshair';
                
                g.addEventListener('mousedown', (e) => {
                    if (currentTool !== 'cursor') return;
                    e.stopPropagation();
                    
                    if (e.button === 2) { // Right click -> rotate
                        if (item.angle !== undefined) {
                            item.angle = (item.angle - 90) % 360;
                            renderAll();
                        }
                        return;
                    }
                    
                    selectedIndex = i;
                    draggedItemIndex = i;
                    const {x, y} = getMouseCoords(e);
                    
                    if (['Wire', 'Rectangle', 'Circle', 'Ellipse'].includes(item.type)) {
                        dragOffset = {x: item.x1 - x, y: item.y1 - y, x2: item.x2 - x, y2: item.y2 - y};
                    } else {
                        dragOffset = {x: item.x - x, y: item.y - y};
                    }
                    
                    updatePropertiesPanel();
                    renderAll();
                });

                if (item.layer === 'under') {
                    underLayer.appendChild(g);
                } else {
                    overLayer.appendChild(g); // Default for shapes and circuits
                }
            });

            // Auto-save to localStorage
            try {
                localStorage.setItem('manim_circuit_autosave', JSON.stringify(items));
            } catch (e) {}
        }

        // --- PAN AND ZOOM LOGIC ---
        let isPanning = false;
        let startPanPt = {x: 0, y: 0};

        svg.addEventListener('wheel', (e) => {
            e.preventDefault();
            const pt = svg.createSVGPoint();
            pt.x = e.clientX; pt.y = e.clientY;
            const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());

            const zoomFactor = e.deltaY > 0 ? 1.1 : 0.9;
            const viewBoxStr = svg.getAttribute('viewBox');
            let [vx, vy, vw, vh] = viewBoxStr.split(/[\s,]+/).filter(Boolean).map(Number);

            const newW = vw * zoomFactor;
            const newH = vh * zoomFactor;

            // Keep mouse stationary
            const newX = svgP.x - (svgP.x - vx) * (newW / vw);
            const newY = svgP.y - (svgP.y - vy) * (newH / vh);

            svg.setAttribute('viewBox', `${newX} ${newY} ${newW} ${newH}`);
        }, {passive: false});

        window.addEventListener('mouseup', (e) => {
            if (e.button === 1 || (e.button === 0 && e.shiftKey)) {
                isPanning = false;
                svg.style.cursor = 'crosshair';
            }
            if (draggedItemIndex !== -1) {
                draggedItemIndex = -1;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (draggedItemIndex !== -1) {
                const {x, y} = getMouseCoords(e);
                let item = items[draggedItemIndex];
                
                if (['Wire', 'Rectangle', 'Circle', 'Ellipse'].includes(item.type)) {
                    item.x1 = Math.round((x + dragOffset.x) * 10) / 10;
                    item.y1 = Math.round((y + dragOffset.y) * 10) / 10;
                    item.x2 = Math.round((x + dragOffset.x2) * 10) / 10;
                    item.y2 = Math.round((y + dragOffset.y2) * 10) / 10;
                } else {
                    item.x = Math.round((x + dragOffset.x) * 10) / 10;
                    item.y = Math.round((y + dragOffset.y) * 10) / 10;
                }
                renderAll();
                return;
            }

            if (isPanning) {
                const dx = e.clientX - startPanPt.x;
                const dy = e.clientY - startPanPt.y;
                startPanPt = {x: e.clientX, y: e.clientY};

                const viewBoxStr = svg.getAttribute('viewBox');
                let [vx, vy, vw, vh] = viewBoxStr.split(/[\s,]+/).filter(Boolean).map(Number);
                const rect = svg.getBoundingClientRect();
                const scaleX = vw / rect.width;
                const scaleY = vh / rect.height;

                svg.setAttribute('viewBox', `${vx - dx * scaleX} ${vy - dy * scaleY} ${vw} ${vh}`);
                return;
            }
        });

        svg.addEventListener('mousemove', (e) => {
            const {x, y} = getMouseCoords(e);
            interactiveLayer.innerHTML = ''; // clear preview

            if (currentTool === 'cursor') return;

            if (currentTool === 'Wire') {
                if (activeWireStart) {
                    interactiveLayer.innerHTML = `<line x1="${activeWireStart.x}" y1="${activeWireStart.y}" x2="${x}" y2="${y}" stroke="rgba(0,0,0,0.4)" stroke-width="0.02" stroke-dasharray="0.1,0.1"/>`;
                } else {
                    interactiveLayer.innerHTML = `<circle cx="${x}" cy="${y}" r="0.03" fill="rgba(0,0,0,0.4)"/>`;
                }
            } else if (currentTool === 'Rectangle' || currentTool === 'Circle' || currentTool === 'Ellipse') {
                const fill = document.getElementById('shape-fill').value;
                const op = document.getElementById('shape-opacity').value;
                
                if (activeShapeStart) {
                    if (currentTool === 'Rectangle') {
                        const w = Math.abs(x - activeShapeStart.x);
                        const h = Math.abs(y - activeShapeStart.y);
                        const minX = Math.min(activeShapeStart.x, x);
                        const minY = Math.min(activeShapeStart.y, y);
                        interactiveLayer.innerHTML = `<rect x="${minX}" y="${minY}" width="${w}" height="${h}" fill="${fill}" fill-opacity="${op}" stroke="#000" stroke-width="0.02" stroke-dasharray="0.1,0.1"/>`;
                    } else if (currentTool === 'Circle') {
                        const r = Math.hypot(x - activeShapeStart.x, y - activeShapeStart.y);
                        interactiveLayer.innerHTML = `<circle cx="${activeShapeStart.x}" cy="${activeShapeStart.y}" r="${r}" fill="${fill}" fill-opacity="${op}" stroke="#000" stroke-width="0.02" stroke-dasharray="0.1,0.1"/>`;
                    } else if (currentTool === 'Ellipse') {
                        const rx = Math.abs(x - activeShapeStart.x);
                        const ry = Math.abs(y - activeShapeStart.y);
                        interactiveLayer.innerHTML = `<ellipse cx="${activeShapeStart.x}" cy="${activeShapeStart.y}" rx="${rx}" ry="${ry}" fill="${fill}" fill-opacity="${op}" stroke="#000" stroke-width="0.02" stroke-dasharray="0.1,0.1"/>`;
                    }
                } else {
                    interactiveLayer.innerHTML = `<circle cx="${x}" cy="${y}" r="0.03" fill="rgba(0,0,0,0.4)"/>`;
                }
            } else if (currentTool === 'Label') {
                interactiveLayer.innerHTML = `<text x="${x}" y="${y}" fill="rgba(0,0,0,0.5)" font-size="0.3" text-anchor="middle" dominant-baseline="central">Text...</text>`;
            } else {
                let angle = previewElem ? previewElem.angle : 0;
                interactiveLayer.innerHTML = `<g transform="translate(${x}, ${y}) rotate(${angle})" opacity="0.6">${getSVGShape(currentTool)}</g>`;
                previewElem = {x, y, angle};
            }
        });

        svg.addEventListener('mousedown', (e) => {
            if (currentTool === 'cursor' && e.button !== 1 && !(e.button === 0 && e.shiftKey)) {
                selectedIndex = -1;
                updatePropertiesPanel();
                renderAll();
            }

            // Pan logic
            if (e.button === 1 || (e.button === 0 && e.shiftKey)) { 
                isPanning = true;
                startPanPt = {x: e.clientX, y: e.clientY};
                svg.style.cursor = 'grab';
                return;
            }

            if (e.button === 2) { // Right click -> Rotate preview
                if (previewElem && currentTool !== 'Label') { 
                    previewElem.angle = (previewElem.angle + 90) % 360; 
                    renderAll(); 
                    svg.dispatchEvent(new MouseEvent('mousemove', e)); 
                }
                return;
            }
            if (e.button !== 0) return; // Only Left click

            const {x, y} = getMouseCoords(e);

            if (currentTool === 'Wire') {
                if (!activeWireStart) {
                    activeWireStart = {x, y};
                } else {
                    if (activeWireStart.x !== x || activeWireStart.y !== y) {
                        items.push({type: 'Wire', x1: activeWireStart.x, y1: activeWireStart.y, x2: x, y2: y});
                        renderAll();
                    }
                    activeWireStart = null;
                    interactiveLayer.innerHTML = '';
                }
            } else if (currentTool === 'Rectangle' || currentTool === 'Circle' || currentTool === 'Ellipse') {
                if (!activeShapeStart) {
                    activeShapeStart = {x, y};
                } else {
                    if (activeShapeStart.x !== x || activeShapeStart.y !== y) {
                        const fill = document.getElementById('shape-fill').value;
                        const op = document.getElementById('shape-opacity').value;
                        const layer = document.querySelector('input[name="shape-layer"]:checked').value;
                        items.push({
                            type: currentTool, 
                            x1: activeShapeStart.x, y1: activeShapeStart.y, 
                            x2: x, y2: y, 
                            fill: fill, opacity: op, layer: layer
                        });
                        renderAll();
                    }
                    activeShapeStart = null;
                    interactiveLayer.innerHTML = '';
                }
            } else if (currentTool === 'Label') {
                let txt = prompt("Enter text:");
                if (txt) {
                    items.push({type: 'Label', text: txt, x, y, angle: 0});
                    renderAll();
                }
            } else if (currentTool !== 'cursor') {
                items.push({type: currentTool, x, y, angle: previewElem ? previewElem.angle : 0});
                renderAll();
            }
        });

         window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelector('.tool-btn[data-tool="cursor"]').click();
            }
            if (e.key === 'z' && e.ctrlKey) {
                e.preventDefault();
                items.pop();
                selectedIndex = -1;
                updatePropertiesPanel();
                renderAll();
            }
            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIndex !== -1) {
                if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                    items.splice(selectedIndex, 1);
                    selectedIndex = -1;
                    updatePropertiesPanel();
                    renderAll();
                }
            }
        });

        document.getElementById('btn-save').addEventListener('click', () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(items, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "circuit.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        });

        document.getElementById('btn-load').addEventListener('click', () => {
            document.getElementById('file-input').click();
        });

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (Array.isArray(parsed)) {
                        items = parsed;
                        selectedIndex = -1;
                        updatePropertiesPanel();
                        renderAll();
                    } else {
                        alert("Invalid file format.");
                    }
                } catch (err) {
                    alert("Error loading file: " + err.message);
                }
            };
            reader.readAsText(file);
            e.target.value = ''; // reset so the same file can be loaded again if needed
        });

        document.getElementById('btn-export').addEventListener('click', () => {
            let scale = parseFloat(document.getElementById('scale-input').value) || 1.0;
            let out = "from manim import *\nfrom circuit_lib import Resistor, Capacitor, Ground, NMOS, Wire, Junction, Switch, Diode, Inductor\n\nclass CustomCircuit(Scene):\n    def construct(self):\n        components = VGroup()\n        wires = VGroup()\n        shapes_under = VGroup()\n        shapes_over = VGroup()\n\n";
            
            items.forEach((c, i) => {
                if (c.type === 'Wire') {
                    let mx1 = c.x1.toFixed(2), my1 = (-c.y1).toFixed(2);
                    let mx2 = c.x2.toFixed(2), my2 = (-c.y2).toFixed(2);
                    out += `        wire_${i} = Wire([${mx1}, ${my1}, 0], [${mx2}, ${my2}, 0], color=BLACK)\n`;
                    out += `        wires.add(wire_${i})\n`;
                } else if (c.type === 'Rectangle') {
                    let name = "rect_" + i;
                    let w = Math.abs(c.x2 - c.x1).toFixed(2);
                    let h = Math.abs(c.y2 - c.y1).toFixed(2);
                    let mx = ((c.x1 + c.x2) / 2).toFixed(2);
                    let my = (-(c.y1 + c.y2) / 2).toFixed(2); // Invert Y
                    out += `        ${name} = Rectangle(width=${w}, height=${h}, color=BLACK, fill_color="${c.fill}", fill_opacity=${c.opacity})\n`;
                    out += `        ${name}.move_to(RIGHT * ${mx} + UP * ${my})\n`;
                    if (c.layer === 'under') out += `        shapes_under.add(${name})\n`;
                    else out += `        shapes_over.add(${name})\n`;
                } else if (c.type === 'Circle') {
                    let name = "circle_" + i;
                    let r = Math.hypot(c.x2 - c.x1, c.y2 - c.y1).toFixed(2);
                    let mx = c.x1.toFixed(2), my = (-c.y1).toFixed(2);
                    out += `        ${name} = Circle(radius=${r}, color=BLACK, fill_color="${c.fill}", fill_opacity=${c.opacity})\n`;
                    out += `        ${name}.move_to(RIGHT * ${mx} + UP * ${my})\n`;
                    if (c.layer === 'under') out += `        shapes_under.add(${name})\n`;
                    else out += `        shapes_over.add(${name})\n`;
                } else if (c.type === 'Ellipse') {
                    let name = "ellipse_" + i;
                    let rx = Math.abs(c.x2 - c.x1).toFixed(2);
                    let ry = Math.abs(c.y2 - c.y1).toFixed(2);
                    let mx = c.x1.toFixed(2), my = (-c.y1).toFixed(2);
                    out += `        ${name} = Ellipse(width=${rx*2}, height=${ry*2}, color=BLACK, fill_color="${c.fill}", fill_opacity=${c.opacity})\n`;
                    out += `        ${name}.move_to(RIGHT * ${mx} + UP * ${my})\n`;
                    if (c.layer === 'under') out += `        shapes_under.add(${name})\n`;
                    else out += `        shapes_over.add(${name})\n`;
                } else if (c.type === 'Label') {
                    let name = "label_" + i;
                    let mx = c.x.toFixed(2), my = (-c.y).toFixed(2);
                    out += `        ${name} = Text('${c.text}', font_size=24, color=BLACK)\n`;
                    out += `        ${name}.move_to(RIGHT * ${mx} + UP * ${my})\n`;
                    out += `        components.add(${name})\n`;
                } else {
                    let name = c.type.toLowerCase() + "_" + i;
                    let mx = c.x.toFixed(2), my = (-c.y).toFixed(2);
                    out += `        ${name} = ${c.type}(color=BLACK)\n`;
                    if (c.angle !== 0) out += `        ${name}.rotate(${-c.angle} * DEGREES)\n`;
                    
                    if (c.type === 'Ground') out += `        ${name}.move_to(RIGHT * ${mx} + UP * ${my}, aligned_edge=UP)\n`;
                    else out += `        ${name}.move_to(RIGHT * ${mx} + UP * ${my})\n`;
                    
                    out += `        components.add(${name})\n`;
                }
            });
            
            out += "\n        all_circuit = VGroup(shapes_under, wires, components, shapes_over)\n";
            if (scale !== 1.0) {
                out += `        all_circuit.scale(${scale})\n`;
            }
            
            out += "\n        if len(shapes_under) > 0: self.play(Create(shapes_under))\n";
            out += "        self.play(Create(wires))\n";
            out += "        self.play(Create(components))\n";
            out += "        if len(shapes_over) > 0: self.play(Create(shapes_over))\n";
            out += "        self.wait(3)\n";
            
            document.getElementById('code-output').value = out;
            document.getElementById('code-panel').style.display = 'flex';
        });

        document.getElementById('btn-close').addEventListener('click', () => { document.getElementById('code-panel').style.display = 'none'; });
        document.getElementById('btn-copy').addEventListener('click', () => {
            const ta = document.getElementById('code-output');
            ta.select(); document.execCommand('copy');
            const btn = document.getElementById('btn-copy');
            btn.textContent = "Copied!"; btn.style.background = "#4ade80";
            setTimeout(() => { btn.textContent = "Copy Code"; btn.style.background = "var(--accent)"; }, 2000);
        });

        // Initialize from localStorage
        try {
            const saved = localStorage.getItem('manim_circuit_autosave');
            if (saved) {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed)) {
                    items = parsed;
                    renderAll();
                }
            }
        } catch (e) {
            console.error("Autoload failed", e);
        }
    </script>
</body>
</html>
